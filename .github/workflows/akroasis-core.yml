name: Akroasis Core CI

on:
  push:
    branches: [main]
    paths:
      - 'akroasis/shared/akroasis-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/akroasis-core.yml'
  pull_request:
    paths:
      - 'akroasis/shared/akroasis-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/akroasis-core.yml'

concurrency:
  group: akroasis-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: akroasis/shared/akroasis-core

      - name: Format
        run: cargo fmt --manifest-path akroasis/shared/akroasis-core/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path akroasis/shared/akroasis-core/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path akroasis/shared/akroasis-core/Cargo.toml
