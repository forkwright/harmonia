name: Mouseion CI

on:
  push:
    branches: [main]
    paths:
      - 'mouseion/**'
      - '.github/workflows/mouseion.yml'
  pull_request:
    paths:
      - 'mouseion/**'
      - '.github/workflows/mouseion.yml'

concurrency:
  group: mouseion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore mouseion/Mouseion.sln

      - name: Build
        run: dotnet build mouseion/Mouseion.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test mouseion/ --configuration Release --no-build --verbosity minimal

      - name: Format check
        run: dotnet format mouseion/Mouseion.sln --verify-no-changes --no-restore
