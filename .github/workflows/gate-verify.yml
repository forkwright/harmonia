name: Gate verify

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify Gate-Passed trailer
        if: github.actor != 'dependabot[bot]'
        run: |
          commits=$(git log --format="%H" origin/main..HEAD)
          if [ -z "$commits" ]; then
            echo "No commits in PR"
            exit 1
          fi

          found=false
          for sha in $commits; do
            body=$(git log -1 --format="%b" "$sha")
            if echo "$body" | grep -q "^Gate-Passed: kanon"; then
              version=$(echo "$body" | grep "^Gate-Passed:" | head -1)
              echo "Found gate attestation: $version"
              found=true
              break
            fi
          done

          if [ "$found" = false ]; then
            echo "::error::No Gate-Passed trailer found in PR commits."
            echo "Run kanon gate locally before pushing."
            exit 1
          fi

