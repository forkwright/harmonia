name: Akroasis Android CI

on:
  push:
    branches: [main]
    paths:
      - 'akroasis/android/**'
      - '.github/workflows/akroasis-android.yml'
  pull_request:
    paths:
      - 'akroasis/android/**'
      - '.github/workflows/akroasis-android.yml'

concurrency:
  group: akroasis-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        run: ./gradlew build
        working-directory: akroasis/android

      - name: Test
        run: ./gradlew test
        working-directory: akroasis/android
