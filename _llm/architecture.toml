[meta]
name = "harmonia"
repo = "forkwright/harmonia"
generated = false
source_docs = [
  "README.md",
  "docs/PROJECT.md",
  "docs/VISION.md",
  "kanon/projects/harmonia/STATE.md",
  "_llm/README.md",
]

[architecture]
summary = "Unified self-hosted media platform replacing the arr stack with a Rust server, canonical storage, acquisition, serving, audio, and desktop/mobile surfaces."
layers = [
  "core",
  "auth",
  "storage",
  "media-ops",
  "acquisition",
  "serving",
  "integration",
  "audio",
  "ui",
  "runtime",
]

[[architecture.crates]]
name = "themelion"
path = "crates/themelion"
role = "Shared types, events, and foundation primitives."

[[architecture.crates]]
name = "apotheke"
path = "crates/apotheke"
role = "SQLite storage, migrations, and typed queries."

[[architecture.crates]]
name = "paroche"
path = "crates/paroche"
role = "Axum HTTP server, REST, streaming, OpenSubsonic, and OPDS surfaces."

[[architecture.crates]]
name = "kathodos"
path = "crates/kathodos"
role = "Filesystem import, renaming, and canonical library layout."

[[architecture.crates]]
name = "ergasia"
path = "crates/ergasia"
role = "Download execution and archive extraction."

[[architecture.crates]]
name = "syntaxis"
path = "crates/syntaxis"
role = "Download queue orchestration and post-processing pipeline."

[[architecture.crates]]
name = "akouo-core"
path = "crates/akouo-core"
role = "Audio decode, DSP, ReplayGain, resampling, and native output."

[[architecture.crates]]
name = "archon"
path = "crates/archon"
role = "Runtime assembler and main CLI/server binary."

[[interfaces]]
name = "harmonia"
kind = "cli"
path = "crates/archon"

[[interfaces]]
name = "harmonia HTTP"
kind = "http"
path = "crates/paroche"
