[meta]
name = "harmonia"
repo = "forkwright/harmonia"
generated = false
source_docs = [
  "README.md",
  "docs/VISION.md",
  "docs/architecture/*.md",
  "kanon/projects/harmonia/STATE.md",
]

[decisions]
summary = "Core decisions for harmonia's media-platform architecture."

[[decision]]
id = "D-one-platform"
title = "Replace the arr stack with one Rust platform"
status = "accepted"
context = "Media lifecycle management was split across many tools with mismatched state and operator surfaces."
decision = "Build one Rust backend that owns acquisition, organization, serving, playback, requests, and integrations."
consequences = "Subsystems share typed storage and events instead of being glued together externally."

[[decision]]
id = "D-one-binary-modes"
title = "One binary with multiple modes"
status = "accepted"
context = "Deployment should produce one artifact while exposing server, render, play, and migration behavior."
decision = "Use one main binary with modes such as serve, desktop/render/play/db/migrate as supported."
consequences = "Packaging and Nix deployment stay simpler."

[[decision]]
id = "D-quic-renderer"
title = "Use custom QUIC streaming from day one"
status = "accepted"
context = "HTTP FLAC would be a stepping stone that does not match multi-room renderer goals."
decision = "Implement server-to-renderer audio streaming through a custom QUIC protocol."
consequences = "Renderer sync and pairing concerns are first-class rather than bolted on later."

[[decision]]
id = "D-native-mobile"
title = "Reject Tauri Mobile for native Android"
status = "accepted"
context = "Mobile player needs a Rust core but platform-native integration."
decision = "Use native Android with Rust core via UniFFI when mobile lands."
consequences = "Desktop and mobile UI stacks diverge intentionally."

[[decision]]
id = "D-dioxus-desktop"
title = "Dioxus desktop is a separate binary"
status = "accepted"
context = "webkit2gtk dependency pollution and Tokio runtime conflicts make a desktop subcommand undesirable."
decision = "Keep Dioxus desktop as a separate binary following the aletheia/proskenion precedent."
consequences = "The server binary stays clean while desktop can consume theatron patterns."
