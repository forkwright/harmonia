# Caddy reverse proxy overlay
# Usage: docker compose -f docker-compose.yml -f deploy/caddy/docker-compose.caddy.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    container_name: mouseion-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - media
    depends_on:
      mouseion:
        condition: service_healthy

  # Override: remove direct port exposure (Caddy handles it)
  mouseion:
    ports: !override []

volumes:
  caddy_data:
  caddy_config:

networks:
  media:
    name: media_media_network
    external: true
