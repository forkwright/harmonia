# SonarCloud configuration for Akroasis
# Configured for Automatic Analysis mode

sonar.organization=forkwright
sonar.projectKey=forkwright_akroasis
sonar.projectName=Akroasis
sonar.projectVersion=0.1.0

# Source directories
sonar.sources=android/app/src/main/java,web/src,shared/akroasis-core/src
sonar.tests=android/app/src/test/java

# Language-specific settings
sonar.java.source=17
sonar.kotlin.source=android/app/src/main/java
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=web/coverage/lcov.info

# Coverage report paths
sonar.coverage.jacoco.xmlReportPaths=android/app/build/reports/jacoco/testDebugUnitTestCoverage/testDebugUnitTestCoverage.xml
sonar.kotlin.coverage.reportPaths=android/app/build/reports/jacoco/testDebugUnitTestCoverage/testDebugUnitTestCoverage.xml

# Exclusions
sonar.exclusions=**/build/**,**/target/**,**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/dist/**,**/.gradle/**,**/generated/**,**/.yarn/**

# Coverage exclusions
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.test.kt,**/test/**,**/tests/**,**/androidTest/**

# Code duplication detection
sonar.cpd.exclusions=**/generated/**,**/test/**,**/androidTest/**

# Android specific
sonar.java.binaries=android/app/build/intermediates/javac/debug/classes
sonar.kotlin.binaries=android/app/build/tmp/kotlin-classes/debug

# Web specific
sonar.sources.web=web/src

# Quality Gate Configuration
# Default "Sonar way" gate requires 80% coverage on new code
# CI enforces 80% overall coverage via android-ci.yml coverage job
# SonarCloud will fail if quality gate conditions are not met
sonar.qualitygate.wait=true

# Rule exclusions - Disable noisy rules for test files
# S100 - Test function naming (allow descriptive test names with spaces)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

sonar.issue.ignore.multicriteria.e1.ruleKey=kotlin:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*Test.kt

sonar.issue.ignore.multicriteria.e2.ruleKey=kotlin:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*Test.kt

sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.test.ts

sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.test.tsx

sonar.issue.ignore.multicriteria.e5.ruleKey=kotlin:S1128
sonar.issue.ignore.multicriteria.e5.resourceKey=**/di/**Module.kt

# New code period - PRs compare against target branch
sonar.newCode.referenceBranch=main
