<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Unified media player for music, audiobooks, podcasts, and ebooks with bit-perfect audio" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="#b46f3f" />
    <link rel="manifest" href="/manifest.json" />
    <title>Akroasis - Ἀκρόασις</title>
  </head>
  <body>
    <script>
      // FOUC prevention: apply theme before first paint
      // Root = warm parchment (light). Dark is opt-in via data-theme="dark".
      (function() {
        var pref = localStorage.getItem('akroasis_theme') || 'light';
        var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
