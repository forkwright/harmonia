name: Android CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'android/**'
      - 'rust/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'android/**'
      - 'rust/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

env:
  ANDROID_SDK_VERSION: '34'
  NDK_VERSION: '27.0.12077973'
  JAVA_VERSION: '17'

jobs:
  lint:
    name: Kotlin Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Run Android Lint
      working-directory: android
      run: ./gradlew lintDebug --no-daemon

    - name: Upload lint results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: android/app/build/reports/lint-results-debug.html

  build-linux:
    name: Build APK (Linux)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: shared/akroasis-core
        cache-on-failure: true

    - name: Install Android targets
      run: |
        rustup target add aarch64-linux-android
        rustup target add armv7-linux-androideabi
        rustup target add x86_64-linux-android

    - name: Install Android NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

    - name: Setup NDK and Rust linkers
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
        NDK_ROOT=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang" >> $GITHUB_ENV
        echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi34-clang" >> $GITHUB_ENV
        echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android34-clang" >> $GITHUB_ENV

    - name: Build Rust library
      working-directory: shared/akroasis-core
      run: |
        cargo build --release --features android --target aarch64-linux-android
        cargo build --release --features android --target armv7-linux-androideabi
        cargo build --release --features android --target x86_64-linux-android

    - name: Copy native libraries
      run: |
        mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
        cp shared/akroasis-core/target/aarch64-linux-android/release/libakroasis_core.so android/app/src/main/jniLibs/arm64-v8a/
        cp shared/akroasis-core/target/armv7-linux-androideabi/release/libakroasis_core.so android/app/src/main/jniLibs/armeabi-v7a/
        cp shared/akroasis-core/target/x86_64-linux-android/release/libakroasis_core.so android/app/src/main/jniLibs/x86_64/

    - name: Build APK
      working-directory: android
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: akroasis-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    name: Kotlin Compile Check (Windows)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create stub native libraries
      shell: bash
      run: |
        mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
        touch android/app/src/main/jniLibs/arm64-v8a/libakroasis_core.so
        touch android/app/src/main/jniLibs/armeabi-v7a/libakroasis_core.so
        touch android/app/src/main/jniLibs/x86_64/libakroasis_core.so

    - name: Compile Kotlin
      working-directory: android
      run: .\gradlew.bat compileDebugKotlin --no-daemon

  rust-quality:
    name: Rust Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install Android targets
      run: |
        rustup target add aarch64-linux-android

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Check formatting
      working-directory: shared/akroasis-core
      run: cargo fmt --check

    - name: Run Clippy
      working-directory: shared/akroasis-core
      run: cargo clippy --features android --target aarch64-linux-android -- -D warnings

    - name: Run tests
      working-directory: shared/akroasis-core
      run: cargo test --lib

    - name: Security audit
      working-directory: shared/akroasis-core
      run: cargo audit
