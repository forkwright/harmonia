name: Security Dependency Scan

on:
  push:
    branches: [main]  # Only on main pushes (releases)
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:  # Manual trigger

jobs:
  npm-audit:
    name: NPM Audit (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: web/npm-audit.json
          if-no-files-found: ignore

  gradle-dependency-check:
    name: Gradle Dependency Check (Android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run dependency check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze --no-daemon

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: android/app/build/reports/dependency-check-report.html
          if-no-files-found: ignore

      - name: Check for vulnerabilities
        run: |
          if grep -q "HIGH\|CRITICAL" android/app/build/reports/dependency-check-report.html 2>/dev/null; then
            echo "HIGH or CRITICAL vulnerabilities found!"
            exit 1
          fi
