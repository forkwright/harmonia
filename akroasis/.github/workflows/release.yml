name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
        working-directory: .

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Build Release APK (unsigned)
        if: ${{ !secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build Release APK (signed)
        if: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease
        working-directory: android
        env:
          KEYSTORE_FILE: ../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APKs
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk release-artifacts/akroasis-${{ steps.version.outputs.VERSION }}-debug.apk
          cp android/app/build/outputs/apk/release/app-release.apk release-artifacts/akroasis-${{ steps.version.outputs.VERSION }}-release.apk || \
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk release-artifacts/akroasis-${{ steps.version.outputs.VERSION }}-release-unsigned.apk

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "${GITHUB_REF#refs/tags/}" | tail -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## Changes" > changelog.md
          echo "" >> changelog.md
          git log ${PREVIOUS_TAG}..${GITHUB_REF#refs/tags/} --pretty=format:"- %s (%h)" >> changelog.md
          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## Installation" >> changelog.md
          echo "" >> changelog.md
          echo "Download the appropriate APK for your device:" >> changelog.md
          echo "- **akroasis-${{ steps.version.outputs.VERSION }}-release.apk** - Recommended for production use" >> changelog.md
          echo "- **akroasis-${{ steps.version.outputs.VERSION }}-debug.apk** - For testing and debugging" >> changelog.md
          echo "" >> changelog.md
          echo "Enable \"Install from Unknown Sources\" in your Android settings before installing." >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always() && ${{ secrets.KEYSTORE_BASE64 }}
        run: rm -f android/app/release.keystore
