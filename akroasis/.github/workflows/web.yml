name: Web/Desktop

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    - name: Install dependencies
      working-directory: ./web
      run: npm ci
    - name: Lint
      working-directory: ./web
      run: npm run lint
    - name: Build
      working-directory: ./web
      run: npm run build
