name: Web CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      working-directory: web
      run: npm ci

    - name: Run linter
      working-directory: web
      run: npm run lint

    - name: Build
      working-directory: web
      run: npm run build

    - name: Check for tests
      working-directory: web
      run: |
        if npm run | grep -q "test"; then
          npm test
        else
          echo "::warning::No test script configured in package.json"
        fi

  dependencies:
    name: Dependency Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check for vulnerabilities
      working-directory: web
      run: |
        npm audit --audit-level=high --production
        echo "::notice::npm audit passed - no high or critical vulnerabilities"
