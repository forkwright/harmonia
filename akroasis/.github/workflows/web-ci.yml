name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

jobs:
  build-and-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      working-directory: web
      run: npm ci

    - name: Lint
      working-directory: web
      run: npm run lint

    - name: Type check
      working-directory: web
      run: npx tsc --noEmit

    - name: Build
      working-directory: web
      run: npm run build

    - name: Test
      working-directory: web
      run: npx vitest run

