# Docker secrets overlay — use instead of file-based secrets
# Usage: docker compose -f docker-compose.yml -f deploy/docker-compose.secrets.yml up -d
#
# Create secrets first:
#   echo "your-jwt-secret-here" | docker secret create mouseion_jwt_secret -
#   echo "your-api-key-here" | docker secret create mouseion_api_key -
#
# Or for compose (non-swarm), use file-based secrets:
#   echo "your-jwt-secret" > /path/to/jwt-secret.txt
#   Then update the file: path below

services:
  mouseion:
    secrets:
      - mouseion_jwt_secret
    environment:
      - TZ=America/Chicago

secrets:
  mouseion_jwt_secret:
    # For Docker Swarm:
    # external: true
    #
    # For Docker Compose (non-swarm), use file:
    file: ${MOUSEION_JWT_SECRET_FILE:-./secrets/jwt-secret.txt}
