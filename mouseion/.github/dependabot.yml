version: 2
updates:
  # .NET dependencies — grouped to reduce PR noise
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    assignees:
      - "forkwright"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      microsoft-dotnet:
        patterns:
          - "Microsoft.*"
        update-types:
          - "minor"
          - "patch"
      mail:
        patterns:
          - "MailKit"
          - "MimeKit"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    assignees:
      - "forkwright"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    assignees:
      - "forkwright"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
