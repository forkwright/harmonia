name: PR Quality Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
    - name: Check PR title format
      uses: amannn/action-semantic-pull-request@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          refactor
          test
          chore
          cleanup
        requireScope: false

    - name: Check for AI attribution
      uses: actions/github-script@v8
      with:
        script: |
          const pr = context.payload.pull_request;
          const body = pr.body || '';
          const title = pr.title || '';
          const combined = (body + ' ' + title).toLowerCase();

          const blocklist = [
            'co-authored-by: claude',
            'generated with claude',
            'ai-generated',
            '🤖'
          ];

          const found = blocklist.filter(term => combined.includes(term));

          if (found.length > 0) {
            core.setFailed(`AI attribution detected: ${found.join(', ')}\nRemove per CLAUDE.md guidelines.`);
          }
